<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <style>

        body{
            background:#f4f4f4;
            font-family:Arial;
        }

        .contact-box{
            width:400px;
            background:white;
            padding:30px;
            margin:auto;
            margin-top:80px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input, textarea{

            width:100%;
            padding:12px;
            margin-top:10px;
            border:1px solid gray;
            border-radius:5px;
        }

        button{

            width:100%;
            padding:12px;
            margin-top:20px;
            background:#3498db;
            color:white;
            border:none;
            border-radius:5px;
        }

        button:hover{
            background:#2980b9;
        }

    </style>

</head>
<body>

<div class="contact-box">

    <h1>Contact Me</h1>

    <a href="/portfolio/">Back</a>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="name"
               placeholder="Enter Name">

        <input type="email"
               name="email"
               placeholder="Enter Email">

        <textarea name="message"
                  rows="5"
                  placeholder="Enter Message"></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

    <h3>Name: {{name}}</h3>

    <h3>Email: {{email}}</h3>

    <h3>Message: {{message}}</h3>

</div>

</body>
</html>
