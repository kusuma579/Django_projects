<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{
            background:linear-gradient(135deg,#141e30,#243b55);
            min-height:100vh;
            padding:40px;
        }
        .title{
            text-align:center;
            color:white;
            margin-bottom:40px;
            font-size:45px;
            font-weight:bold;
        }
        .cart-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            transition:0.3s;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }
        .cart-card:hover{
            transform:translateY(-8px);
        }
        .card-top{
            background:#198754;
            color:white;
            text-align:center;
            padding:25px;
        }
        .card-top i{
            font-size:60px;
        }
        .price{
            color:green;
            font-size:24px;
            font-weight:bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">
        <i class="bi bi-cart-fill"></i>
        My Cart
    </h1>
    <div class="text-center mb-4">
        <a href="/product/product_list/"
           class="btn btn-light btn-lg">
            Back To Products
        </a>
    </div>
    <div class="row g-4">
        {% for item in cart_items %}
        <div class="col-md-4">
            <div class="card cart-card">
                <div class="card-top">
                    <i class="bi bi-bag-check-fill"></i>
                </div>
                <div class="card-body text-center">
                    <h3>
                        {{ item.product.p_name }}
                    </h3>
                    <p class="text-muted">
                        {{ item.product.p_type }}
                    </p>
                    <p class="price">
                        ₹ {{ item.product.p_price }}
                    </p>
                    <p>
                        Quantity :
                        {{ item.product.p_quantity }}
                    </p>
                    <div class="d-flex gap-2 mt-3">
                        <a href="/product/update_product/{{ item.product.id }}/"
                           class="btn btn-primary w-50">
                            <i class="bi bi-pencil-square"></i>
                            Update
                        </a>
                        <a href="/product/remove_from_cart/{{ item.id }}/"
                           class="btn btn-danger w-50">
                            <i class="bi bi-trash"></i>
                            Remove
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
