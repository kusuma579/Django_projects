<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#11998e,#38ef7d);
        }

        .success-box{
            background:white;
            padding:50px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            width:450px;
        }

        .success-box h1{
            color:#11998e;
            margin-bottom:20px;
            font-size:35px;
        }

        .success-box p{
            font-size:20px;
            color:#333;
            margin-bottom:30px;
        }

        .btn-custom{
            padding:12px 20px;
            border-radius:10px;
            font-size:18px;
            text-decoration:none;
            color:white;
            transition:0.3s;
        }

        .add-btn{
            background:#11998e;
        }

        .add-btn:hover{
            background:#0d7d6f;
        }

        .view-btn{
            background:#243b55;
        }

        .view-btn:hover{
            background:#141e30;
        }

    </style>

</head>
<body>

    <div class="success-box">

        <h1>Success 🎉</h1>

        <p>{{ message }}</p>

        <div class="d-flex gap-3 justify-content-center">

            <!-- Add Product Button -->
            <a href="/product/add_product/"
               class="btn-custom add-btn">

                Add Another Product

            </a>

            <!-- View Products Button -->
            <a href="/product/product_list/"
               class="btn-custom view-btn">
                View Products
            </a>
        </div>
    </div>
</body>
</html>
