<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body{
            background: linear-gradient(135deg,#141e30,#243b55);
            min-height:100vh;
            padding:40px;
        }
        .title{
            text-align:center;
            color:white;
            margin-bottom:40px;
            font-weight:bold;
            font-size:45px;
        }
        .product-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
            transition:0.4s;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
        }
        .product-card:hover{
            transform:translateY(-10px) scale(1.03);
        }
        .card-top{
            background:#243b55;
            color:white;
            text-align:center;
            padding:25px;
        }
        .card-top i{
            font-size:60px;
        }
        .card-body h3{
            color:#243b55;
            font-weight:bold;
        }
        .price{
            color:green;
            font-size:25px;
            font-weight:bold;
        }
        .quantity{
            color:#555;
            font-size:18px;
        }
        .btn-custom{
            background:#243b55;
            color:white;
            border:none;
            width:100%;
            border-radius:10px;
            padding:10px;
            transition:0.3s;
        }
        .btn-custom:hover{
            background:#141e30;
        }
        .top-btn{
            margin-bottom:30px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title">All Products</h1>

    <div class="text-center top-btn">
        <a href="/product/add_product/" class="btn btn-light btn-lg">
            <i class="bi bi-plus-circle"></i> Add Product
        </a>
    </div>
    <div class="text-center mb-4">
        <a href="/product/cart/"
           class="btn btn-warning btn-lg">
            <i class="bi bi-cart-fill"></i>
            View Cart
        </a>
    </div>
    <div class="row g-4">
        {% for product in products %}
        <div class="col-md-4">
            <div class="card product-card">
                <div class="card-top">
                    <i class="bi bi-box-seam"></i>
                </div>
                <div class="card-body text-center">
                    <h3>{{ product.p_name }}</h3>
                    <p class="text-muted">
                        {{ product.p_type }}
                    </p>
                    <p class="price">
                        ₹ {{ product.p_price }}
                    </p>
                    <p class="quantity">
                        Quantity : {{ product.p_quantity }}
                    </p>
                    <div class="d-flex gap-2 mt-3">
                        <a href="/product/add_to_cart/{{ product.id }}/"
                           class="btn btn-success w-50">
                            <i class="bi bi-cart-plus"></i>
                            Cart
                        </a>
                        <a href="/product/update_product/{{ product.id }}/"
                           class="btn btn-primary w-50">
                            <i class="bi bi-pencil-square"></i>
                            Update
                        </a>
                    </div>
                    <div class="mt-2">
                        <a href="/product/delete_product/{{ product.id }}/"
                           class="btn btn-danger w-100">
                            <i class="bi bi-trash"></i>
                            Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
